<!--
  ============================================================
   YAMANOTE RIDE  —  ride the window, not the map
  ============================================================
   HOW TO ADD YOUR OWN SOUNDS
   --------------------------------------------------------
   Every station below has a `sounds` object:
       melody       -> departure melody (plays when LEAVING that station)
       announcement -> arrival announcement (plays when PULLING IN)
       ambience     -> optional per-station platform ambience (looped)
       melodies     -> optional { eraId: url } map for past departure melodies
                        (see MELODY_ERAS below) — e.g. {current:'...', heisei1:'...'}
                        lets a rider pick an older melody from the setup card's
                        "Departure melody era" select. Falls back to `melody`
                        for the 'current' era, and to a synth placeholder
                        (varied per era) for any era with no file.
   Put a URL (mp3/ogg/wav) in any of these. Leave it null and a
   synthesized placeholder is generated automatically, so the ride
   is never silent or broken.

   Shared sounds live in SHARED below:
       doorChime        -> short chime when doors close / depart
       transitAmbience  -> looping "train running" sound (overrides synth clatter)

   Upload folders / naming convention:
       sounds/departure-melodies/{line}-{station-number}-{station-slug}-departure-melody.mp3
       sounds/announcements/{line}-{station-number}-{station-slug}-arrival-announcement.mp3
       sounds/ambience/{line}-{station-number}-{station-slug}-platform-ambience.mp3

   Example:
       sounds:{ melody:'sounds/departure-melodies/jy-20-shibuya-departure-melody.mp3',
                announcement:'sounds/announcements/jy-20-shibuya-arrival-announcement.mp3',
                ambience:'sounds/ambience/jy-20-shibuya-platform-ambience.mp3' }

   See sounds/README.md for full upload instructions and shared sound names.

   You can also tune the pacing in TIMING / SPEED near the bottom
   of the CONFIG block.
  ============================================================
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#9ACD32;        /* active JR line color */
    --green-deep:#6fa01f;
    --ink:#1c2230;
    --paper:#f6f5ef;
    --frame:#cfd2cf;
    --frame-dark:#9aa09a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#0a0d18;
    font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    color:#fff;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
  #app{position:fixed;inset:0;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* ---------- glass / reflection ---------- */
  #glass{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden;
    box-shadow:inset 0 0 220px rgba(4,6,14,.72);
    background:
      linear-gradient(115deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,0) 22%, rgba(255,255,255,0) 60%, rgba(255,255,255,.03) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 2px, rgba(0,0,0,0) 2px 4px);}
  #glass::before{content:"";position:absolute;top:-20%;bottom:-20%;left:-30%;width:22%;
    background:linear-gradient(100deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.07) 45%, rgba(255,255,255,0) 100%);
    transform:skewX(-12deg); animation:glassGlint 13s ease-in-out infinite;}
  @keyframes glassGlint{0%{left:-30%}45%{left:115%}100%{left:115%}}

  /* ---------- train interior window frame ---------- */
  #frame{position:absolute;inset:0;pointer-events:none;z-index:6}
  .bar{position:absolute;background:linear-gradient(180deg,#e7e9e4,#c2c6c1)}
  #f-top{top:0;left:0;right:0;height:22px;background:linear-gradient(180deg,#d7dad5,#a9aea8)}
  #f-left{top:0;bottom:0;left:0;width:26px;background:linear-gradient(90deg,#e3e6e1,#aeb3ad)}
  #f-right{top:0;bottom:0;right:0;width:26px;background:linear-gradient(270deg,#e3e6e1,#aeb3ad)}
  #f-bottom{left:0;right:0;bottom:0;height:84px;background:linear-gradient(180deg,#c8ccc6,#e9ebe6 55%,#d2d6cf)}
  #f-bottom::before{content:"";position:absolute;top:0;left:0;right:0;height:9px;
    background:linear-gradient(180deg,var(--green),var(--green-deep));
    box-shadow:0 1px 4px rgba(0,0,0,.25)}
  #f-bottom::after{content:"";position:absolute;left:26px;right:26px;bottom:14px;height:40px;border-radius:6px;
    background:repeating-linear-gradient(90deg,#bfc3bd 0 7px,#cdd1cb 7px 14px);
    box-shadow:inset 0 1px 3px rgba(0,0,0,.18);opacity:.85}
  /* rounded inner corners */
  .corner{position:absolute;width:30px;height:30px;background:radial-gradient(circle at var(--cx) var(--cy), transparent 0 22px, #c2c6c1 22px)}
  #c-tl{top:22px;left:26px;--cx:100%;--cy:100%}
  #c-tr{top:22px;right:26px;--cx:0;--cy:100%}

  /* ---------- HUD — riveted placard hanging off the top frame rail ---------- */
  #hud{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:8;display:flex;gap:8px;align-items:center;
    transition:opacity .5s;background:linear-gradient(180deg,#e7e9e4,#bfc3bd);padding:5px 14px 6px;
    border-radius:0 0 12px 12px;box-shadow:0 4px 10px rgba(0,0,0,.35),inset 0 -1px 0 rgba(255,255,255,.5)}
  .badge{background:var(--green);color:#13310a;font-weight:800;border-radius:5px;
    padding:4px 9px;font-size:12px;letter-spacing:.04em;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15)}
  #phaseTag{font-size:12px;font-weight:600;color:#2c3326;background:rgba(0,0,0,.08);
    border:1px solid rgba(0,0,0,.12);padding:4px 9px;border-radius:5px}
  #transferTag{font-size:12px;font-weight:800;color:#fff;background:var(--green-deep);
    border:1px solid rgba(0,0,0,.18);padding:4px 9px;border-radius:5px;
    opacity:0;transform:translateY(-4px);transition:opacity .35s,transform .35s,border-color .35s,background .35s}
  #transferTag.show{opacity:1;transform:none}

  /* ---------- station sign ---------- */
  #signWrap{position:absolute;left:50%;top:14%;transform:translate(-50%,30px);z-index:9;
    opacity:0;transition:transform .7s cubic-bezier(.2,.8,.2,1),opacity .6s;pointer-events:none;width:min(560px,86vw)}
  #signWrap.show{opacity:1;transform:translate(-50%,0)}
  #signWrap::before{content:"";position:absolute;top:-15px;left:50%;transform:translateX(-50%);
    width:7px;height:18px;background:linear-gradient(180deg,#aab0aa,#6e736e);border-radius:2px;
    box-shadow:0 0 0 3px rgba(0,0,0,.12)}
  #sign{background:var(--paper);border-radius:14px;padding:16px 20px 12px;color:var(--ink);
    box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 3px rgba(255,255,255,.5) inset;position:relative;
    font-family:"M PLUS Rounded 1c","Noto Sans JP",sans-serif}
  #sign .kana{font-size:14px;color:#7a8068;text-align:center;letter-spacing:.18em;font-weight:500}
  #sign .kanji{font-size:clamp(34px,7vw,52px);font-weight:800;text-align:center;line-height:1.05;letter-spacing:.06em}
  #sign .romaji{font-size:15px;text-align:center;letter-spacing:.34em;text-transform:uppercase;color:#3a4150;margin-top:2px;font-weight:700}
  #sign .lineband{margin-top:12px;height:30px;border-radius:16px;background:linear-gradient(180deg,var(--green),var(--green-deep));
    display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:relative}
  #sign.transfer-pulse{box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 3px rgba(255,255,255,.5) inset,0 0 0 6px color-mix(in srgb, var(--green) 65%, transparent);
    animation:transferPulse 1.1s ease-in-out infinite alternate}
  @keyframes transferPulse{from{filter:saturate(1)}to{filter:saturate(1.25) brightness(1.06)}}
  #sign .nb{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:44px;height:44px;border-radius:50%;background:#fff;border:3px solid var(--green-deep);
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2c3a14;box-shadow:0 4px 10px rgba(0,0,0,.3)}
  #sign .nb b{font-size:9px;letter-spacing:.06em;line-height:1;margin-top:2px}
  #sign .nb span{font-size:18px;font-weight:800;line-height:1}
  #sign .adj{color:#163a06;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;max-width:38%;overflow:hidden;white-space:nowrap}
  #sign .adj.r{justify-content:flex-end}

  /* ---------- subtitle ---------- */
  #subtitle{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);z-index:8;text-align:center;
    opacity:0;transition:opacity .5s;pointer-events:none;width:90%}
  #subtitle.show{opacity:1}
  #subtitle .jp{font-size:clamp(20px,4vw,30px);font-weight:700;text-shadow:0 3px 14px rgba(0,0,0,.8)}
  #subtitle .en{font-size:14px;letter-spacing:.16em;color:#dfe4ef;margin-top:2px;text-shadow:0 2px 10px rgba(0,0,0,.8)}

  /* ---------- setup card ---------- */
  #setup{position:absolute;inset:0;z-index:12;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 30%, rgba(8,11,22,.25), rgba(6,8,16,.78));transition:opacity .6s}
  .card{position:relative;width:min(440px,90vw);background:var(--paper);color:var(--ink);
    border:1px solid rgba(0,0,0,.12);border-radius:10px;padding:30px 28px 26px;
    box-shadow:0 26px 70px rgba(0,0,0,.55),inset 0 0 0 6px rgba(0,0,0,.035)}
  .card::before,.card::after{content:"";position:absolute;top:-9px;width:38px;height:18px;
    background:rgba(255,255,255,.5);box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .card::before{left:26px;transform:rotate(-4deg)}
  .card::after{right:26px;transform:rotate(4deg)}
  .card h1{font-size:26px;font-weight:900;letter-spacing:.02em;display:flex;align-items:center;gap:10px}
  .card h1 .jr{background:var(--green);color:#13310a;font-size:13px;padding:3px 7px;border-radius:5px}
  .card p.sub{color:#5b6354;font-size:13px;margin-top:6px;line-height:1.5}
  .field{margin-top:18px}
  .field label{display:block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#7c8470;margin-bottom:6px}
  .selrow{position:relative}
  select{width:100%;appearance:none;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.16);
    color:var(--ink);font-size:16px;padding:13px 40px 13px 14px;border-radius:8px;cursor:pointer;
    font-family:inherit}
  select:focus{outline:none;border-color:var(--green)}
  .selrow::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#7c8470;pointer-events:none}
  option{background:#fff;color:#1c2230}
  .swap{display:flex;justify-content:center;margin:6px 0 -4px}
  .swap button{background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.16);color:#3a4030;
    width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px;transition:.2s}
  .swap button:hover{background:var(--green);color:#13310a;transform:rotate(180deg)}
  .endlessRow{display:flex;align-items:center;gap:9px;margin-top:16px;font-size:13px;color:#3a4030;cursor:pointer;user-select:none}
  .endlessRow input{width:17px;height:17px;accent-color:var(--green);cursor:pointer}
  #departBtn{width:100%;margin-top:18px;background:linear-gradient(180deg,var(--green),var(--green-deep));
    color:#10300a;border:none;border-radius:10px;padding:16px;font-size:17px;font-weight:800;letter-spacing:.04em;
    cursor:pointer;font-family:inherit;box-shadow:0 12px 30px rgba(154,205,50,.32);transition:.15s}
  #departBtn:hover{filter:brightness(1.06);transform:translateY(-1px)}
  #departBtn:active{transform:translateY(0)}
  #departBtn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.4)}
  #routePreview{margin-top:14px;border:1px solid rgba(0,0,0,.12);border-radius:10px;
    background:rgba(0,0,0,.035);padding:12px 12px 10px;color:#2b3024}
  #routePreview .meta{display:flex;justify-content:space-between;gap:12px;font-size:12px;color:#6c7460;
    letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
  #routePreview .stations{display:flex;gap:6px;overflow:hidden;white-space:nowrap;font-size:13px;line-height:1.5}
  #routePreview .stations span{display:inline-flex;align-items:center;gap:6px;color:#21281a}
  #routePreview .stations span:not(:last-child)::after{content:'›';color:var(--green-deep);font-weight:800}
  #soundStatus{margin-top:10px;font-size:12px;color:#6c7460;line-height:1.45}
  #soundStatus b{color:var(--green-deep);font-weight:800}

  /* ---------- ride controls — built into the window sill, not a floating pill ---------- */
  #controls{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:10;
    display:none;align-items:center;gap:8px;background:linear-gradient(180deg,#e3e6e1,#bcc0ba);
    border:1px solid rgba(0,0,0,.18);border-radius:30px;padding:7px 12px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 3px 10px rgba(0,0,0,.35)}
  #controls.show{display:flex}
  .ctrl{background:rgba(0,0,0,.07);border:none;color:#262c20;width:40px;height:40px;border-radius:50%;
    cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .ctrl:hover{background:var(--green);color:#13310a}
  .ctrl.big{width:48px;height:48px;font-size:18px}
  #volRow{display:flex;align-items:center;gap:6px;padding:0 6px}
  #vol{width:78px;accent-color:var(--green);cursor:pointer}
  #exitBtn{font-size:13px;font-weight:600;padding:0 14px;width:auto;border-radius:21px}

  /* ---------- progress ticks — etched into the sill above the controls ---------- */
  #progress{position:absolute;left:50%;bottom:66px;transform:translateX(-50%);z-index:8;
    display:none;gap:5px;align-items:center;max-width:90vw;flex-wrap:wrap;justify-content:center;
    background:rgba(0,0,0,.12);padding:6px 14px;border-radius:20px}
  #progress.show{display:flex}
  .tick{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:.4s;position:relative}
  .tick.done{background:rgba(154,205,50,.65)}
  .tick.cur{background:var(--green);box-shadow:0 0 0 4px rgba(154,205,50,.3);transform:scale(1.35)}
  .tick.end{outline:2px solid rgba(255,255,255,.6);outline-offset:2px}

  /* ---------- arrived ---------- */
  #arrived{position:absolute;inset:0;z-index:13;display:none;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 40%, rgba(8,11,22,.3), rgba(5,7,14,.85));text-align:center}
  #arrived.show{display:flex}
  #arrived .inner{animation:rise .8s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  #arrived .jp{font-size:clamp(40px,9vw,72px);font-weight:900;color:var(--green);text-shadow:0 6px 30px rgba(0,0,0,.6)}
  #arrived .en{font-size:16px;letter-spacing:.24em;color:#d6dceb;margin-top:8px}
  #arrived .dest{font-size:clamp(22px,4vw,30px);font-weight:700;margin-top:20px}
  #arrived button{margin-top:30px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
    color:#fff;border-radius:30px;padding:13px 28px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
  #arrived button:hover{background:var(--green);color:#13310a;border-color:var(--green)}

  .hideUI{opacity:0!important}
  @media(max-width:600px){
    #hud{top:30px;left:30px}
    #f-bottom{height:72px}
    #signWrap{top:11%}
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div id="glass"></div>
  <div id="frame">
    <div class="bar" id="f-top"></div>
    <div class="bar" id="f-left"></div>
    <div class="bar" id="f-right"></div>
    <div class="bar" id="f-bottom"></div>
    <div class="corner" id="c-tl"></div>
    <div class="corner" id="c-tr"></div>
  </div>

  <div id="hud">
    <div class="badge" id="lineBadge">JR Yamanote Line</div>
    <div id="phaseTag">Waiting</div>
    <div id="transferTag">Transfer</div>
  </div>

  <div id="signWrap">
    <div id="sign">
      <div class="kana"></div>
      <div class="kanji"></div>
      <div class="romaji"></div>
      <div class="lineband">
        <div class="adj l"></div>
        <div class="nb"><b>JY</b><span>00</span></div>
        <div class="adj r"></div>
      </div>
    </div>
  </div>

  <div id="subtitle"><div class="jp"></div><div class="en"></div></div>

  <div id="progress"></div>

  <div id="controls">
    <button class="ctrl" id="exitBtn" title="New journey">✕ Exit</button>
    <button class="ctrl" id="prevInfo" title="Previous station" style="display:none">⏮</button>
    <button class="ctrl big" id="playBtn" title="Pause / Play">⏸</button>
    <button class="ctrl" id="skipBtn" title="Skip to next station">⏭</button>
    <div id="volRow">
      <button class="ctrl" id="muteBtn" title="Mute" style="width:34px;height:34px;font-size:15px;background:transparent">🔊</button>
      <input id="vol" type="range" min="0" max="100" value="80">
    </div>
  </div>

  <div id="setup">
    <div class="card">
      <h1><span class="jr">JR</span> Tokyo Line Ride</h1>
      <p class="sub">Pick a From and To station — the shortest way around the rail network is chosen for you, transferring lines automatically if needed.</p>

      <div class="field">
        <label>From</label>
        <div class="selrow"><select id="fromSel"></select></div>
      </div>

      <div class="swap"><button id="swapBtn" title="Swap">⇅</button></div>

      <div class="field" id="toField">
        <label>To</label>
        <div class="selrow"><select id="toSel"></select></div>
      </div>

      <div class="field">
        <label>Departure melody era</label>
        <div class="selrow"><select id="eraSel"></select></div>
      </div>

      <label class="endlessRow"><input type="checkbox" id="endlessChk"> Ride endlessly on this line (loops forever)</label>

      <button id="departBtn">Ride</button>

      <div id="routePreview" aria-live="polite">
        <div class="meta"><span id="routeMeta">—</span><span id="routeTime">—</span></div>
        <div class="stations" id="routeStations"></div>
      </div>
      <div id="soundStatus"></div>
    </div>
  </div>

  <div id="arrived">
    <div class="inner">
      <div class="jp">Arrived</div>
      <div class="en">YOU HAVE ARRIVED</div>
      <div class="dest" id="arrDest"></div>
      <button id="againBtn">Ride again</button>
    </div>
  </div>
</div>

<script>
/* ===================================================================
   CONFIG  —  edit station sounds here
   =================================================================== */
const YAMANOTE_STATIONS = [
  {line:'JY', no:1, kanji:'東京',         kana:'とうきょう',     romaji:'Tokyo',          sounds:{melody:null,announcement:'sounds/announcements/jy-01-tokyo-arrival-announcement.mp3',ambience:null}},
  {line:'JY', no:2, kanji:'神田',         kana:'かんだ',         romaji:'Kanda',          sounds:{melody:null,announcement:'sounds/announcements/jy-02-kanda-arrival-announcement.mp3',ambience:null}},
  {line:'JY', no:3, kanji:'秋葉原',       kana:'あきはばら',     romaji:'Akihabara',      sounds:{melody:null,announcement:'sounds/announcements/jy-03-akihabara-arrival-announcement.mp3',ambience:null}},
  {line:'JY', no:4, kanji:'御徒町',       kana:'おかちまち',     romaji:'Okachimachi',    sounds:{melody:null,announcement:'sounds/announcements/jy-04-okachimachi-arrival-announcement.mp3',ambience:null}},
  {line:'JY', no:5, kanji:'上野',         kana:'うえの',         romaji:'Ueno',           sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:6, kanji:'鶯谷',         kana:'うぐいすだに',   romaji:'Uguisudani',     sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:7, kanji:'日暮里',       kana:'にっぽり',       romaji:'Nippori',        sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:8, kanji:'西日暮里',     kana:'にしにっぽり',   romaji:'Nishi-Nippori',  sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:9, kanji:'田端',         kana:'たばた',         romaji:'Tabata',         sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:10,kanji:'駒込',         kana:'こまごめ',       romaji:'Komagome',       sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:11,kanji:'巣鴨',         kana:'すがも',         romaji:'Sugamo',         sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:12,kanji:'大塚',         kana:'おおつか',       romaji:'Otsuka',         sounds:{melody:null,announcement:null,ambience:null}},
  {line:'JY', no:13,kanji:'池袋',         kana:'いけぶくろ',     romaji:'Ikebukuro',      sounds:{melody:null,announcement:null,ambience:null}},

/* ---- network graph: every modeled line, joined at same-name stations ---- */
const nodeKey = (lineId,idx) => `${lineId}:${idx}`;
function buildNetwork(){
  const graph = {};
  const edge=(a,b)=>{ (graph[a]=graph[a]||[]).push(b); };
  Object.values(LINES).forEach(line=>{
    const n=line.stations.length;
    for(let i=0;i<n;i++){
      const k=nodeKey(line.id,i);
      graph[k]=graph[k]||[];
      if(line.circular){ edge(k,nodeKey(line.id,(i+1)%n)); edge(k,nodeKey(line.id,(i-1+n)%n)); }
      else { if(i+1<n) edge(k,nodeKey(line.id,i+1)); if(i-1>=0) edge(k,nodeKey(line.id,i-1)); }
    }
  });
  const ids=Object.keys(LINES);
  for(let a=0;a<ids.length;a++) for(let b=a+1;b<ids.length;b++){
    const L1=LINES[ids[a]], L2=LINES[ids[b]];
    L1.stations.forEach((s1,i1)=>{
      const i2=L2.stations.findIndex(s2=>s2.romaji===s1.romaji);
      if(i2>=0){ edge(nodeKey(L1.id,i1),nodeKey(L2.id,i2)); edge(nodeKey(L2.id,i2),nodeKey(L1.id,i1)); }
    });
  }
  return graph;
}
const NETWORK = buildNetwork();
function shortestPath(fromKey,toKey){
  if(fromKey===toKey) return [fromKey];
  const visited=new Set([fromKey]), prev={}, q=[fromKey];
  while(q.length){
    const cur=q.shift();
    if(cur===toKey) break;
    for(const nb of NETWORK[cur]||[]){
      if(!visited.has(nb)){ visited.add(nb); prev[nb]=cur; q.push(nb); }
    }
  }
  if(!visited.has(toKey)) return null;
  const path=[toKey]; let c=toKey;
  while(c!==fromKey){ c=prev[c]; path.unshift(c); }
  return path;
}
function pathToNodes(path){
  return path.map(k=>{ const [lineId,idxStr]=k.split(':'); const idx=+idxStr;
    return {key:k,lineId,idx,st:LINES[lineId].stations[idx]}; });
}

/* ---- departure melody eras ----
   Many JR stations have swapped their departure melody over the decades. Each era below has
   an id (used as the key in a station's optional `sounds.melodies` map), a label with the
   active year range, and a synthSeed so even stations with no real recording for an era still
   get an audibly distinct placeholder melody instead of silence/repeats.
   To add a real recording for a station+era, set:
       sounds:{ melodies:{ current:'sounds/departure-melodies/jy-20-shibuya-current-departure-melody.mp3',
                            heisei1:'sounds/departure-melodies/jy-20-shibuya-1990s-departure-melody.mp3' } }
*/
const MELODY_ERAS = [
  {id:'current', label:'Current (2022–present)',  years:[2022,2026], synthSeed:0},
  {id:'heisei2', label:'Late Heisei (2003–2021)',  years:[2003,2021], synthSeed:401},
  {id:'heisei1', label:'Early Heisei (1990–2002)', years:[1990,2002], synthSeed:802},
  {id:'showa',   label:'Shōwa (–1989)',            years:[1970,1989], synthSeed:1203},
];

const pad2 = n => String(n).padStart(2,'0');
const formatMs = ms => { const total=Math.max(0,Math.round(ms/1000)); const m=Math.floor(total/60), sec=String(total%60).padStart(2,'0'); return `${m}:${sec}`; };
function smooth(t){t=Math.max(0,Math.min(1,t));return t*t*(3-2*t);}
function hash(n){let x=Math.sin(n*127.1+311.7)*43758.5453;return x-Math.floor(x);}
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* =========================================================
   AUDIO ENGINE
   ========================================================= */
const Audio_ = {
  ctx:null, master:null, melodyG:null, announceG:null, transitG:null, stationG:null,
  buffers:{}, durations:{}, brownLoop:null,
  rumbleSrc:null, fileRumble:false, lastSpeed:0, muted:false, started:false,

  init(){
    if(this.started) return;
    const C = window.AudioContext||window.webkitAudioContext;
    const ctx = this.ctx = new C();
    this.master = ctx.createGain();   this.master.gain.value = 0.8;
    this.master.connect(ctx.destination);
    this.melodyG   = ctx.createGain(); this.melodyG.gain.value=0.9;   this.melodyG.connect(this.master);
    this.announceG = ctx.createGain(); this.announceG.gain.value=0.9; this.announceG.connect(this.master);
    this.transitG  = ctx.createGain(); this.transitG.gain.value=0;    this.transitG.connect(this.master);
    this.stationG  = ctx.createGain(); this.stationG.gain.value=0;     this.stationG.connect(this.master);

    this.brownLoop = this._noise(3,'brown');

    // continuous rumble (synth) OR file ambience
    if(SHARED.transitAmbience){
      this.fileRumble = true;
      this._loadBuffer(SHARED.transitAmbience).then(buf=>{
        if(!buf){ this.fileRumble=false; this._startSynthRumble(); return; }
        const s=ctx.createBufferSource(); s.buffer=buf; s.loop=true;
        s.connect(this.transitG); s.start(); this.rumbleSrc=s;
      });
    } else {
      this._startSynthRumble();
    }
    // station hum (synth, lowpassed brown)
    const hum=ctx.createBufferSource(); hum.buffer=this.brownLoop; hum.loop=true;
    const hlp=ctx.createBiquadFilter(); hlp.type='lowpass'; hlp.frequency.value=520;
    const hg=ctx.createGain(); hg.gain.value=0.5;
    hum.connect(hlp).connect(hg).connect(this.stationG); hum.start();

    this.started = true;
  },

  _startSynthRumble(){
    const ctx=this.ctx;
    const s=ctx.createBufferSource(); s.buffer=this.brownLoop; s.loop=true;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=330;
    s.connect(lp).connect(this.transitG); s.start(); this.rumbleSrc=s;
  },

  _noise(sec,type){
    const ctx=this.ctx, len=ctx.sampleRate*sec, buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
    let last=0;
    for(let i=0;i<len;i++){const w=Math.random()*2-1;
      if(type==='brown'){last=(last+0.02*w)/1.02; d[i]=last*3.4;} else d[i]=w;}
    return buf;
  },

  resume(){ if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },

  setVolume(v){ if(this.master) this.master.gain.setTargetAtTime(this.muted?0:v, this.ctx.currentTime, .05); this._vol=v; },
  setMuted(m){ this.muted=m; this.setVolume(this._vol??0.8); },

  /* gains follow train speed each frame */
  updateSpeed(spd, playing){
    this.lastSpeed=spd;
    if(!this.ctx) return;
    const t=this.ctx.currentTime, sN=Math.min(1,spd/SPEED.cruise);
    this.transitG.gain.setTargetAtTime(playing? sN*0.9 : 0, t, 0.25);
    this.stationG.gain.setTargetAtTime(playing? (1-sN)*0.45 : 0, t, 0.35);
  },

  async _loadBuffer(url){
    if(this.buffers[url]!==undefined) return this.buffers[url];
    const p = (async()=>{
      try{
        const r=await fetch(url); const a=await r.arrayBuffer();
        const b=await this.ctx.decodeAudioData(a);
        this.durations[url]=b.duration; return b;
      }catch(e){ console.warn('audio load failed:',url,e); this.durations[url]=0; return null; }
    })();
    this.buffers[url]=p; return p;
  },
  preload(url){ if(url) this._loadBuffer(url); },
  /* synchronous best-effort duration (sec); 0/undefined until loaded */
  knownDuration(url){ return url ? this.durations[url] : undefined; },
  _playBuffer(url,dest){
    this._loadBuffer(url).then(b=>{ if(!b) return;
      const s=this.ctx.createBufferSource(); s.buffer=b; s.connect(dest); s.start();
    });
  },

  /* ---- one-shots ---- */
  melody(st, eraId){
    this.resume();
    const era = MELODY_ERAS.find(e=>e.id===eraId) || MELODY_ERAS[0];
    const url = (st.sounds.melodies && st.sounds.melodies[era.id]) || (era.id==='current' ? st.sounds.melody : null);
    if(url){ this._playBuffer(url,this.melodyG); }
    else this._synthMelody(st.no + era.synthSeed);
  },
  announcement(st){
    this.resume();
    if(st.sounds.announcement){ this._playBuffer(st.sounds.announcement,this.announceG); }
    else this._synthChime();
  },
  doorChime(){
    this.resume();
    if(SHARED.doorChime){ this._playBuffer(SHARED.doorChime,this.announceG); return; }
    const t0=this.ctx.currentTime;
    for(let i=0;i<3;i++) this._tone(680,t0+i*0.16,0.13,0.16,this.announceG,'sine');
  },

  _marimba(freq,when,dur,dest){
    const ctx=this.ctx;
    const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=freq;
    const o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2.01;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=freq*4;
    const g=ctx.createGain(); const g2=ctx.createGain(); g2.gain.value=0.25;
    g.gain.setValueAtTime(0,when); g.gain.linearRampToValueAtTime(0.5,when+0.012);
    g.gain.exponentialRampToValueAtTime(0.0008,when+dur);
    o.connect(lp); o2.connect(g2).connect(lp); lp.connect(g).connect(dest);
    o.start(when); o2.start(when); o.stop(when+dur+0.05); o2.stop(when+dur+0.05);
  },
  _synthMelody(seed){
    const ctx=this.ctx, t0=ctx.currentTime+0.03;
    const penta=[0,2,4,7,9,12,14,16], base=523.25;
    const r=mulberry(seed*977+13);
    const n=6+Math.floor(r()*4); let time=t0; let prev=-1;
    for(let i=0;i<n;i++){
      let idx=Math.floor(r()*penta.length); if(idx===prev) idx=(idx+1)%penta.length; prev=idx;
      const freq=base*Math.pow(2,penta[idx]/12);
      this._marimba(freq,time,0.55,this.melodyG);
      time += 0.17+r()*0.07;
    }
  },
  _bell(freq,when,dest){
    const ctx=this.ctx;
    [1,2.0,3.01].forEach((m,i)=>{
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq*m;
      const g=ctx.createGain(); const amp=[0.5,0.18,0.08][i];
      g.gain.setValueAtTime(0,when); g.gain.linearRampToValueAtTime(amp,when+0.01);
      g.gain.exponentialRampToValueAtTime(0.0006,when+1.3);
      o.connect(g).connect(dest); o.start(when); o.stop(when+1.4);
    });
  },
  _synthChime(){ const t=this.ctx.currentTime+0.02; this._bell(987.77,t,this.announceG); this._bell(739.99,t+0.46,this.announceG); },
  _tone(freq,when,dur,amp,dest,type){
    const ctx=this.ctx, o=ctx.createOscillator(); o.type=type||'sine'; o.frequency.value=freq;
    const g=ctx.createGain(); g.gain.setValueAtTime(0,when); g.gain.linearRampToValueAtTime(amp,when+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,when+dur);
    o.connect(g).connect(dest); o.start(when); o.stop(when+dur+0.03);
  },
};

   SCENE  (canvas parallax cityscape)
   ========================================================= */
const Scene = {
  cv:null, ctx:null, W:0, H:0, dpr:1, worldX:0, time:0, horizon:0,
  stars:[],
  init(){
    this.cv=$('#scene'); this.ctx=this.cv.getContext('2d');
    this.resize(); window.addEventListener('resize',()=>this.resize());
    for(let i=0;i<120;i++) this.stars.push({x:Math.random(),y:Math.random()*0.45,r:Math.random()*1.3+0.2,t:Math.random()*6.28});
  },
  resize(){
    this.dpr=Math.min(2,window.devicePixelRatio||1);
    this.W=window.innerWidth; this.H=window.innerHeight;
    this.cv.width=this.W*this.dpr; this.cv.height=this.H*this.dpr;
    this.ctx.setTransform(this.dpr,0,0,this.dpr,0,0);
    this.horizon=this.H*0.60;
  },
  advance(spd,dt){ this.worldX += spd*dt; this.time += dt; },

  draw(spd){
    const c=this.ctx, W=this.W, H=this.H, hz=this.horizon, sN=Math.min(1,spd/SPEED.cruise);
    c.clearRect(0,0,W,H);

    // sway
    const bob = Math.sin(this.time*2.1)*2.2*sN + Math.sin(this.time*5.3)*0.6*sN;
    c.save(); c.translate(0,bob);

    // sky
    const sky=c.createLinearGradient(0,-4,0,hz+40);
    sky.addColorStop(0,'#141934'); sky.addColorStop(0.45,'#33365e');
    sky.addColorStop(0.8,'#7a5b73'); sky.addColorStop(1,'#e0a173');
    c.fillStyle=sky; c.fillRect(0,-6,W,hz+46);
    // glow near horizon
    const glow=c.createRadialGradient(W*0.7,hz,10,W*0.7,hz,W*0.6);
    glow.addColorStop(0,'rgba(255,196,140,.5)'); glow.addColorStop(1,'rgba(255,196,140,0)');
    c.fillStyle=glow; c.fillRect(0,0,W,hz+40);
    // stars
    for(const s of this.stars){const tw=0.5+0.5*Math.sin(this.time*1.5+s.t);
      c.globalAlpha=tw*0.7*(1-s.y/0.45); c.fillStyle='#fff';
      c.beginPath(); c.arc(s.x*W,s.y*H,s.r,0,6.28); c.fill();}
    c.globalAlpha=1;
    // moon
    c.fillStyle='rgba(248,240,220,.9)'; c.beginPath(); c.arc(W*0.18,hz*0.32,26,0,6.28); c.fill();
    c.fillStyle='rgba(248,240,220,.12)'; c.beginPath(); c.arc(W*0.18,hz*0.32,46,0,6.28); c.fill();

    // building layers (back -> front)
    this._buildings({parallax:0.14, cellW:150, minH:60, maxH:150, color:'#3a3a55', win:false, seed:10, landmarks:true});
    this._buildings({parallax:0.34, cellW:120, minH:80, maxH:230, color:'#262738', win:true,  seed:55, winColor:'#ffca7a', winChance:0.35});
    this._buildings({parallax:0.66, cellW:150, minH:120,maxH:320, color:'#15161f', win:true,  seed:120,winColor:'#bcd4ff', winChance:0.28});

    // ground
    const gr=c.createLinearGradient(0,hz,0,H);
    gr.addColorStop(0,'#0d0e16'); gr.addColorStop(1,'#05060c');
    c.fillStyle=gr; c.fillRect(0,hz,W,H-hz+8);

    // poles & wires (fast)
    this._wires(sN);

    // trackside fence — closest layer, right at the edge of the glass, sells speed/proximity
    this._trackside(sN);

    // speed streaks
    if(sN>0.25){
      c.strokeStyle='rgba(255,255,255,'+(0.05*sN)+')'; c.lineWidth=1;
      for(let i=0;i<6;i++){const y=hz*0.3+ (this.worldX*0.4+i*70)%(hz*0.7);
        const len=40+sN*120; const x=(this.worldX*2.0+i*220)%(W+len)-len;
        c.beginPath(); c.moveTo(x,y); c.lineTo(x+len,y); c.stroke();}
    }
    c.restore();
  },

  /* close, fast-moving fence posts right beside the track — motion-streaked at speed so the
     foreground reads as "rushing past inches from the glass" rather than flat scenery */
  _trackside(sN){
    const c=this.ctx, W=this.W, hz=this.horizon, sp=64, off=this.worldX*2.6;
    const start=Math.floor(off/sp)-1, end=start+Math.ceil(W/sp)+2;
    const topY=hz-30, botY=hz+34, stretch=1+sN*5.5;
    for(let p=start;p<=end;p++){
      const x=p*sp-off, w=4+hash(p*9.1)*2;
      c.fillStyle='rgba(3,4,7,.92)';
      if(sN>0.08){ c.fillRect(x-w*stretch*0.5,topY,w*stretch,botY-topY); }
      else c.fillRect(x,topY,w,botY-topY);
    }
    // low rail/sleeper band right under the window sill
    const railG=c.createLinearGradient(0,botY,0,botY+18);
    railG.addColorStop(0,'rgba(10,11,16,.9)'); railG.addColorStop(1,'rgba(10,11,16,0)');
    c.fillStyle=railG; c.fillRect(0,botY,W,18);
  },

  _buildings(L){
    const c=this.ctx, W=this.W, hz=this.horizon, off=this.worldX*L.parallax;
    const start=Math.floor(off/L.cellW)-1, end=start+Math.ceil(W/L.cellW)+2;
    for(let cell=start;cell<=end;cell++){
      const x=cell*L.cellW-off;
      const r1=hash(cell*1.7+L.seed), r2=hash(cell*3.1+L.seed+0.5);
      // landmark?
      if(L.landmarks && hash(cell*5.3+L.seed)>0.93){
        if(cell%2===0) this._tower(x+L.cellW*0.3,hz,1+r1*0.4);
        else this._skytree(x+L.cellW*0.3,hz,1+r1*0.3);
        continue;
      }
      const h=L.minH+r1*(L.maxH-L.minH);
      const bw=L.cellW*(0.66+r2*0.28);
      const y=hz-h;
      c.fillStyle=L.color; c.fillRect(x,y,bw,h+6);
      // rooftop bits
      if(r2>0.6){c.fillRect(x+bw*0.2,y-6-r1*8,4,7); }
      // windows
      if(L.win){
        const cols=Math.max(2,Math.floor(bw/13)), rows=Math.floor(h/16);
        for(let wx=0;wx<cols;wx++)for(let wy=0;wy<rows;wy++){
          if(hash(cell*7.3+wx*13.7+wy*0.9+L.seed) < L.winChance){
            c.fillStyle=L.winColor; c.globalAlpha=0.55+hash(cell+wx+wy)*0.4;
            c.fillRect(x+5+wx*13, y+8+wy*16, 6, 8);
          }
        }
        c.globalAlpha=1;
      }
    }
  },
  _tower(x,hz,s){ // Tokyo Tower silhouette
    const c=this.ctx, h=190*s, w=70*s, y=hz-h;
    c.fillStyle='#7a2e26';
    c.beginPath(); c.moveTo(x,hz); c.lineTo(x+w*0.5,y); c.lineTo(x+w,hz);
    c.lineTo(x+w*0.62,hz); c.lineTo(x+w*0.5,y+h*0.55); c.lineTo(x+w*0.38,hz); c.closePath(); c.fill();
    c.fillStyle='#8a352b'; c.fillRect(x+w*0.42,y-14*s,w*0.16,16*s);
    c.fillStyle='rgba(255,120,90,.8)'; c.fillRect(x+w*0.47,y-22*s,3,8*s);
  },
  _skytree(x,hz,s){
    const c=this.ctx, h=300*s, y=hz-h;
    c.fillStyle='#2a3340';
    c.beginPath(); c.moveTo(x+10,hz); c.lineTo(x+18,y+h*0.35); c.lineTo(x+22,y+h*0.35); c.lineTo(x+30,hz); c.closePath(); c.fill();
    c.fillRect(x+18,y+30,4,h*0.35);
    c.fillStyle='#37424f'; c.beginPath(); c.arc(x+20,y+h*0.34,11*s,0,6.28); c.fill();
    c.fillStyle='rgba(150,200,255,.5)'; c.fillRect(x+19,y,2,30);
  },
  _wires(sN){
    const c=this.ctx, W=this.W, hz=this.horizon, off=this.worldX*1.3, sp=270;
    const start=Math.floor(off/sp)-1, end=start+Math.ceil(W/sp)+2;
    const topY=hz-150;
    c.strokeStyle='rgba(8,9,14,.85)'; c.lineWidth=2;
    // wires
    c.beginPath();
    for(let p=start;p<=end;p++){
      const x=p*sp-off, x2=(p+1)*sp-off;
      for(let k=-1;k<=1;k++){
        const yo=k*8;
        c.moveTo(x,topY+yo); c.quadraticCurveTo((x+x2)/2,topY+yo+26,x2,topY+yo);
      }
    }
    c.stroke();
    // poles
    for(let p=start;p<=end;p++){
      const x=p*sp-off;
      c.fillStyle='#0a0b11'; c.fillRect(x-3,topY-14,6,hz-topY+14);
      c.fillRect(x-26,topY-2,52,5);
      c.fillRect(x-18,topY+12,36,4);
    }
  }
};

/* =========================================================
   JOURNEY  (state machine)
   ========================================================= */
const Ride = {
  route:[], steps:[], idx:0, phaseStart:0, playing:false, riding:false,
  pausedAt:0, fromKey:null, toKey:null, lastT:performance.now(),
  endless:false, dir:1, melodyEra:'current',

  buildRoute(){
    const path=shortestPath(this.fromKey,this.toKey);
    this.route = path ? pathToNodes(path) : [];
  },
  /* next station along the chosen line in the current direction — wraps forever
     on circular lines (Yamanote), reverses direction at the terminus on linear ones (Chūō) */
  nextNodeAfter(node){
    const line=LINES[node.lineId], n=line.stations.length;
    let nidx;
    if(line.circular){ nidx=(node.idx+this.dir+n)%n; }
    else {
      nidx=node.idx+this.dir;
      if(nidx<0){ this.dir=1; nidx=node.idx+1; }
      else if(nidx>=n){ this.dir=-1; nidx=node.idx-1; }
    }
    return {key:nodeKey(node.lineId,nidx),lineId:node.lineId,idx:nidx,st:line.stations[nidx]};
  },
  /* keep a lookahead buffer of steps so the endless ride never runs out and never has to "finish" */
  extendEndless(){
    while(this.steps.length-this.idx<=6){
      const last=this.route[this.route.length-1];
      this.route.push(this.nextNodeAfter(last));
      const k=this.route.length-1;
      this.steps.push({type:'transit',rpos:k});
      this.steps.push({type:'arrive',rpos:k});
      this.steps.push({type:'dwell',rpos:k,final:false});
      this.steps.push({type:'depart',rpos:k});
    }
  },
  buildSteps(){
    const s=[]; const R=this.route;
    s.push({type:'depart',rpos:0});
    for(let k=1;k<R.length;k++){
      s.push({type:'transit',rpos:k});
      s.push({type:'arrive',rpos:k});
      s.push({type:'dwell',rpos:k,final:(k===R.length-1)});
      if(k<R.length-1) s.push({type:'depart',rpos:k});
    }
    this.steps=s;
  },
  stationOf(step){ return this.route[step.rpos].st; },
  lineOf(step){ return LINES[this.route[step.rpos].lineId]; },
  isLineChange(rpos){ return rpos>0 && this.route[rpos].lineId!==this.route[rpos-1].lineId; },

  start(){
    Audio_.init(); Audio_.resume();
    if(this.endless){
      this.dir=1;
      this.route=[pathToNodes([this.fromKey])[0]];
      this.buildSteps();
      this.extendEndless();
    } else {
      this.buildRoute(); if(this.route.length<2 && this.fromKey!==this.toKey) return;
      this.buildSteps();
    }
    this.idx=0; this.riding=true; this.playing=true;
    UI.enterRide();
    UI.buildProgress(this.route, this.endless);
    this.phaseStart=performance.now();
    this.onStepStart();
  },
  finish(){
    this.playing=false;
    UI.setPhase('Arrived');
    UI.showArrived(this.route[this.route.length-1].st);
  },
  exit(){
    this.riding=false; this.playing=false;
    UI.setPhase('Waiting');
    UI.exitRide();
  },

  onStepStart(){
    const step=this.steps[this.idx]; if(!step) return this.finish();
    const st=this.stationOf(step), line=this.lineOf(step);
    if(step.type==='depart'){
      UI.setPhase('Departure melody');
      UI.showSign(step.rpos);
      Audio_.doorChime();
      setTimeout(()=>{ if(this.playing) Audio_.melody(st,this.melodyEra); }, SHARED.doorChime?0:520);
      UI.clearSubtitle();
      this._hideSignTimer=setTimeout(()=>UI.hideSign(), TIMING.depart*0.62);
      if(step.rpos===0) UI.updateProgress(0);
    }
    else if(step.type==='transit'){
      UI.setPhase('In transit'); UI.applyTheme(line); UI.hideSign(); UI.clearSubtitle();
      Audio_.preload(st.sounds.announcement); // give the file time to decode before it has to play
    }
    else if(step.type==='arrive'){
      UI.setPhase('Arrival announcement');
      UI.showSign(step.rpos);
      Audio_.announcement(st);
      UI.updateProgress(step.rpos);
      const last = step.rpos===this.route.length-1;
      UI.subtitle(`Arriving soon: ${st.romaji}`, (last?'Final stop · ':'Arriving at ')+st.romaji);
      this._fitDwellToAnnouncement(step);
    }
    else if(step.type==='dwell'){
      const nextChange = !step.final && this.isLineChange(step.rpos+1);
      UI.setPhase(step.final?'Final stop':(nextChange?'Transfer':'Stopped'));
      if(!step.final) UI.subtitle(st.romaji, nextChange?`Transfer to ${LINES[this.route[step.rpos+1].lineId].name}`:'Doors opening');
    }
  },

  duration(){ const t=this.steps[this.idx]; return t.dur ?? TIMING[t.type]; },

  /* stretch the dwell phase so the full station-specific announcement always finishes before departure */
  _fitDwellToAnnouncement(arriveStep){
    const dwellStep = this.steps[this.idx+1];
    const url = this.stationOf(arriveStep).sounds.announcement;
    if(!dwellStep || !url) return;
    const apply=()=>{
      const dur = Audio_.knownDuration(url);
      if(!dur) return;
      const needed = dur*1000 + 500 - TIMING.arrive;
      dwellStep.dur = Math.max(TIMING.dwell, needed);
    };
    if(Audio_.knownDuration(url)!==undefined) apply();
    else Audio_._loadBuffer(url).then(()=>{ if(this.steps[this.idx]===arriveStep) apply(); });
  },

  tick(now){
    let dt=(now-this.lastT)/1000; this.lastT=now;
    if(dt>0.1) dt=0.1;

    let spd=0;
    if(!this.riding){ spd=SPEED.idleDrift; }
    else if(this.playing){
      const step=this.steps[this.idx];
      const p=(now-this.phaseStart)/this.duration();
      if(step){
        if(step.type==='depart') spd=SPEED.cruise*smooth(p);
        else if(step.type==='transit') spd=SPEED.cruise;
        else if(step.type==='arrive') spd=SPEED.cruise*smooth(1-p);
        else spd=0;
      }
      if(p>=1){ this.idx++; this.phaseStart=now;
        if(this.endless) this.extendEndless();
        if(this.idx>=this.steps.length) this.finish(); else this.onStepStart(); }
    } else { spd=0; } // paused

    Scene.advance(spd,dt);
    Scene.draw(spd);
    Audio_.updateSpeed(spd, this.riding && this.playing);
    requestAnimationFrame(t=>this.tick(t));
  },

  togglePlay(){
    if(!this.riding) return;
    if(this.playing){ this.playing=false; this.pausedAt=performance.now(); UI.setPlayIcon(false); }
    else { this.playing=true; this.phaseStart+=performance.now()-this.pausedAt; UI.setPlayIcon(true);
      Audio_.resume(); }
  },
  skip(){
    if(!this.riding||!this.playing) return;
    if(this.endless) this.extendEndless();
    // jump to next 'arrive' step
    for(let j=this.idx+1;j<this.steps.length;j++){
      if(this.steps[j].type==='arrive'){ this.idx=j; this.phaseStart=performance.now(); clearTimeout(this._hideSignTimer); this.onStepStart(); return; }
    }
    this.finish();
  }
};

/* =========================================================
   UI
   ========================================================= */
const UI = {
  initSelects(){
    const f=$('#fromSel'), t=$('#toSel');
    const populate=(sel)=>{
      sel.innerHTML='';
      Object.values(LINES).forEach(line=>{
        const og=document.createElement('optgroup'); og.label=`${line.id} ${line.kanji} · ${line.name}`;
        line.stations.forEach((s,i)=>{
          const o=document.createElement('option'); o.value=nodeKey(line.id,i);
          o.textContent=`${s.line}${pad2(s.no)} ${s.kanji} · ${s.romaji}`;
          og.appendChild(o);
        });
        sel.appendChild(og);
      });
    };
    populate(f); populate(t);
    f.value=nodeKey('JY',0); t.value=nodeKey('JY',16);
    Ride.fromKey=f.value; Ride.toKey=t.value;

    const eraSel=$('#eraSel');
    eraSel.innerHTML = MELODY_ERAS.map(e=>`<option value="${e.id}">${e.label}</option>`).join('');
    eraSel.value='current'; Ride.melodyEra='current';
    eraSel.onchange=()=>{ Ride.melodyEra=eraSel.value; this.refreshRoute(); };
    f.onchange=()=>{Ride.fromKey=f.value; this.refreshRoute();};
    t.onchange=()=>{Ride.toKey=t.value; this.refreshRoute();};
    $('#swapBtn').onclick=()=>{const a=f.value; f.value=t.value; t.value=a; Ride.fromKey=f.value; Ride.toKey=t.value; this.refreshRoute();};
    $('#endlessChk').onchange=()=>{
      Ride.endless = $('#endlessChk').checked;
      $('#toField').style.display = Ride.endless ? 'none' : '';
      $('.swap').style.display = Ride.endless ? 'none' : '';
      this.refreshRoute();
    };
    this.refreshRoute();
  },
  applyTheme(line){
    document.documentElement.style.setProperty('--green', line.color);
    document.documentElement.style.setProperty('--green-deep', line.deep);
    $('#lineBadge').textContent=line.badge;
  },
  applyStationTheme(node, prevNode){
    const line=LINES[node.lineId], st=node.st;
    this.applyTheme(line);
    $('#sign .nb b').textContent=line.id;
    const realTransfer = prevNode && prevNode.lineId!==node.lineId;
    const decorative = !realTransfer && st.transfers?.[0];
    if(realTransfer){
      $('#transferTag').textContent=`On: ${line.name}`;
    } else if(decorative){
      $('#transferTag').textContent=`Transfer: ${decorative.name}`;
    }
    $('#transferTag').classList.toggle('show', !!(realTransfer||decorative));
    $('#sign').classList.toggle('transfer-pulse', !!realTransfer);
  },
  refreshRoute(){
    if(Ride.endless){
      const node=pathToNodes([Ride.fromKey])[0], line=LINES[node.lineId];
      $('#departBtn').disabled=false; $('#departBtn').textContent='Ride Endlessly ∞';
      $('#routeMeta').textContent=`Endless loop on ${line.name}`;
      $('#routeTime').textContent='∞';
      $('#routeStations').innerHTML=`<span>${node.st.romaji}</span><span>…</span>`;
      $('#soundStatus').innerHTML=`Loops forever${line.circular?' around the loop':' — direction reverses at each terminus'}; missing audio uses synth placeholders.`;
      this.applyTheme(line);
      return;
    }
    $('#departBtn').textContent='Ride';
    const path=shortestPath(Ride.fromKey,Ride.toKey);
    const same = Ride.fromKey===Ride.toKey;
    $('#departBtn').disabled = !path || same;
    if(!path){ $('#routeMeta').textContent='No route found'; $('#routeTime').textContent='—'; $('#routeStations').innerHTML=''; $('#soundStatus').innerHTML=''; return; }
    const nodes = pathToNodes(path);
    const transfers = nodes.slice(1).filter((n,i)=>n.lineId!==nodes[i].lineId).length;
    const stops = nodes.length-1;
    const travelMs = same ? 0 : TIMING.depart + stops*(TIMING.transit+TIMING.arrive+TIMING.dwell) + Math.max(0,stops-1)*TIMING.depart;
    $('#routeMeta').textContent = same ? 'Choose a different destination'
      : `${stops} stop${stops!==1?'s':''}${transfers?` · ${transfers} transfer${transfers!==1?'s':''}`:''} · ${nodes.length} station signs`;
    $('#routeTime').textContent = same ? '—' : `demo ${formatMs(travelMs)}`;
    const names = nodes.map(n=>n.st.romaji);
    const compact = names.length>8 ? [...names.slice(0,4),'…',...names.slice(-3)] : names;
    $('#routeStations').innerHTML = compact.map(name=>`<span>${name}</span>`).join('');
    const lineNames = [...new Set(nodes.map(n=>LINES[n.lineId].name))].join(' → ');
    const allStations = Object.values(LINES).flatMap(l=>l.stations);
    const stationFiles = allStations.reduce((sum,st)=>sum + ['melody','announcement','ambience'].filter(k=>!!st.sounds[k]).length
      + Object.values(st.sounds.melodies||{}).filter(Boolean).length, 0);
    const sharedFiles = ['doorChime','transitAmbience'].filter(k=>!!SHARED[k]).length;
    const era = MELODY_ERAS.find(e=>e.id===Ride.melodyEra) || MELODY_ERAS[0];
    $('#soundStatus').innerHTML = `<b>${lineNames}</b> · <b>${stationFiles}</b> station sounds and <b>${sharedFiles}</b> shared sounds configured · melody era: <b>${era.label}</b> · missing audio uses synth placeholders`;
    this.applyTheme(LINES[nodes[0].lineId]);
  },
  setPhase(text){ $('#phaseTag').textContent=text; },

  enterRide(){
    $('#setup').style.opacity='0'; $('#setup').style.pointerEvents='none';
    setTimeout(()=>$('#setup').style.display='none',600);
    $('#controls').classList.add('show');
    $('#progress').classList.add('show');
    $('#arrived').classList.remove('show');
    this.setPlayIcon(true);
  },
  exitRide(){
    $('#controls').classList.remove('show');
    $('#progress').classList.remove('show');
    $('#arrived').classList.remove('show');
    this.hideSign(); this.clearSubtitle();
    $('#setup').style.display='flex';
    requestAnimationFrame(()=>{ $('#setup').style.opacity='1'; $('#setup').style.pointerEvents='auto'; });
  },

  showSign(rpos){
    const R=Ride.route, node=R[rpos], st=node.st;
    const prev = rpos>0? R[rpos-1].st : null;
    const next = rpos<R.length-1? R[rpos+1].st : null;
    const sign=$('#sign');
    this.applyStationTheme(node, rpos>0?R[rpos-1]:null);
    sign.querySelector('.kana').textContent=st.kana;
    sign.querySelector('.kanji').textContent=st.kanji;
    sign.querySelector('.romaji').textContent=st.romaji;
    sign.querySelector('.nb span').textContent=pad2(st.no);
    sign.querySelector('.adj.l').innerHTML = prev? `← ${prev.romaji}` : '・';
    sign.querySelector('.adj.r').innerHTML = next? `${next.romaji} →` : 'Final stop';
    $('#signWrap').classList.add('show');
  },
  hideSign(){ $('#signWrap').classList.remove('show'); },

  subtitle(jp,en){ const s=$('#subtitle'); s.querySelector('.jp').textContent=jp; s.querySelector('.en').textContent=en; s.classList.add('show'); },
  clearSubtitle(){ $('#subtitle').classList.remove('show'); },

  buildProgress(route, endless){
    this._endlessProgress = !!endless;
    const p=$('#progress'); p.innerHTML='';
    if(endless) return; // rendered as a sliding window by updateProgress instead
    route.forEach((si,k)=>{ const d=document.createElement('div'); d.className='tick'+(k===route.length-1?' end':''); d.dataset.k=k; p.appendChild(d); });
  },
  updateProgress(rpos){
    if(this._endlessProgress){
      const p=$('#progress'); p.innerHTML='';
      const total=Ride.route.length, start=Math.max(0,rpos-2), end=Math.min(total-1,rpos+4);
      for(let k=start;k<=end;k++){ const d=document.createElement('div'); d.className='tick'+(k===rpos?' cur':k<rpos?' done':''); p.appendChild(d); }
      return;
    }
    document.querySelectorAll('#progress .tick').forEach((el,k)=>{
      el.classList.toggle('done', k<rpos);
      el.classList.toggle('cur', k===rpos);
    });
  },

  setPlayIcon(playing){ $('#playBtn').textContent = playing?'⏸':'▶'; },

  showArrived(st){
    $('#arrDest').textContent = `${st.kanji} · ${st.romaji}`;
    $('#arrived').classList.add('show');
    this.hideSign(); this.clearSubtitle();
    $('#controls').classList.remove('show');
    $('#progress').classList.remove('show');
  },

  bindControls(){
    $('#departBtn').onclick=()=>Ride.start();
    $('#playBtn').onclick=()=>Ride.togglePlay();
    $('#skipBtn').onclick=()=>Ride.skip();
    $('#exitBtn').onclick=()=>Ride.exit();
    $('#againBtn').onclick=()=>{ $('#arrived').classList.remove('show'); Ride.exit(); };
    $('#vol').oninput=e=>{ Audio_.setVolume(+e.target.value/100); };
    $('#muteBtn').onclick=()=>{
      const m=!Audio_.muted; Audio_.setMuted(m);
      $('#muteBtn').textContent = m?'🔇':'🔊';
    };
  }
};

/* ---------- boot ---------- */
Scene.init();
UI.initSelects();
